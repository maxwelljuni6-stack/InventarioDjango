<!DOCTYPE html>
<html lang="es">
<head> 
<meta charset="UTF-8"> 
<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
<title>IUJO Inventario</title>
</head>
<body> 
<nav class="navbar navbar-dark bg-primary mb-4"> 
<div class="container"> 
<a class="navbar-brand" href="/">IUJO Sistema</a> 
<div> 
                {% if user.is_authenticated %} 
<span class="text-white me-2">👤 {{ user.username }}</span> 
<form action="{% url 'logout' %}" method="post" 
style="display:inline;"> 
                        {% csrf_token %} 
<button class="btn btn-sm btn-danger">Salir</button> 
</form> 
                {% else %} 
<a href="{% url 'login' %}" class="btn btn-sm btn
light">Entrar</a> 
                {% endif %} 
</div> 
</div> 
</nav> 
<div class="container"> {% block content %} {% endblock %} </div>
</body>
</html>
